workflows:
  android-workflow:
    name: ConceptAlive - Android
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Bootstrap project from zip
        script: |
          if [ -f conceptalive_flutter_app.zip ]; then
            unzip -o conceptalive_flutter_app.zip -d /tmp/extracted
            cp -rf /tmp/extracted/conceptalive/. .
          fi
      - name: Scaffold native platform folders
        script: |
          if [ ! -d android ]; then
            flutter create . --org com.yourname --project-name conceptalive
          fi
      - name: Get Flutter packages
        script: flutter pub get
      - name: Analyze
        script: flutter analyze || true
      - name: Build APK (release)
        script: flutter build apk --release
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
    publishing:
      email:
        recipients:
          - your-email@example.com   # <-- change this
        notify:
          success: true
          failure: true
