name: conceptalive
description: A complete, production-ready Flutter application demonstrating Clean Architecture, Material 3, state management with Provider, and responsive UI design.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.13.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.4.0

  # Navigation
  go_router: ^13.0.0

  # UI & Theme
  google_fonts: ^6.2.0

  # HTTP Client
  http: ^1.1.0

  # Local Storage
  shared_preferences: ^2.2.3

  # JSON Serialization
  json_annotation: ^4.8.1

  # Connectivity
  connectivity_plus: ^5.0.2

  # Internationalization
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^3.0.0

  # JSON Serialization Generator
  json_serializable: ^6.7.1
  build_runner: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/

  fonts:
    - family: CustomFont
      fonts:
        - asset: assets/fonts/CustomFont-Regular.ttf
        - asset: assets/fonts/CustomFont-Bold.ttf
          weight: 700
        - asset: assets/fonts/CustomFont-Italic.ttf
          style: italic
